<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Nay La Cua Tao</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    color: white;
    font-family: 'Press Start 2P', cursive;
    text-align: center;
}

canvas {
    display: none;
    width: 100vw;
    height: 100vh;
    background: #111;
}

#menu {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.start-btn {
    padding: 15px 30px;
    font-size: 14px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 5px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div id="menu" onclick="startGame()">
    <h1>ChieuBhong</h1>
    <p>Bấm để chơi</p>
    <button class="start-btn">START</button>
</div>

<audio id="bgMusic" loop>
    <source src="poorartistt-90s-game-music-no-copyright-352850.mp3">
</audio>

<audio id="coinSound">
    <source src="coin.mp3">
</audio>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

// ===== LOAD ẢNH =====
let loaded = 0;
function checkLoad(){ loaded++; }

let playerImg = new Image();
playerImg.src = "Quill.png";
playerImg.onload = checkLoad;

let coinSprite = new Image();
coinSprite.src = "coin-sprite.png";
coinSprite.onload = checkLoad;

// ===== GAME DATA =====
let player = { lane: 1, y: 500, width: 50, height: 50 };
let obstacles = [];
let coins = [];

let score = 0;
let coinScore = 0;
let speed = 4;

let gameOver = false;
let started = false;

// ===== SPRITE CONFIG =====
const TOTAL_FRAMES = 6;
const FRAME_WIDTH = 16;
const FRAME_HEIGHT = 16;

coinSprite.onload = function(){
    FRAME_WIDTH = coinSprite.width / TOTAL_FRAMES;
    FRAME_HEIGHT = coinSprite.height;
    checkLoad();
};

// ===== SPAWN =====
function spawnObstacle(){
    if (gameOver) return;
    let lane = Math.floor(Math.random()*4);
    let laneWidth = canvas.width/4;

    obstacles.push({
        x: lane*laneWidth + laneWidth/2 -25,
        y: -60,
        w: 50,
        h: 50
    });
}

function spawnCoin(){
    if (gameOver) return;
    let lane = Math.floor(Math.random()*4);
    let laneWidth = canvas.width/4;

    coins.push({
        x: lane*laneWidth + laneWidth/2,
        y: -30,
        frame: 0
    });
}

// ===== CONTROL =====
document.addEventListener("keydown", e=>{
    if(e.key==="Enter" && !started) startGame();
    if(gameOver && e.key==="Enter") location.reload();

    if(!started || gameOver) return;

    if(e.key==="ArrowLeft" && player.lane>0) player.lane--;
    if(e.key==="ArrowRight" && player.lane<3) player.lane++;
});

// ===== START =====
function startGame(){
    if(started) return;
    started = true;

    document.getElementById("menu").style.display="none";
    canvas.style.display="block";

    document.getElementById("bgMusic").play().catch(()=>{});

    setInterval(spawnObstacle,1200);
    setInterval(spawnCoin,1500);

    draw();
}

// ===== DRAW =====
let lastSpeedUp = 0;

function draw(){
    if(loaded < 2){
        requestAnimationFrame(draw);
        return;
    }

    if(gameOver){
        ctx.fillStyle="white";
        ctx.font="20px 'Press Start 2P'";
        ctx.textAlign="center";
        ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);
        return;
    }

    ctx.fillStyle="#111";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let laneWidth = canvas.width/4;

    // lane
    ctx.strokeStyle="#333";
    for(let i=1;i<4;i++){
        let x=i*laneWidth;
        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,canvas.height);
        ctx.stroke();
    }

    // player
    let px = player.lane*laneWidth + laneWidth/2;
    ctx.drawImage(playerImg, px-25, player.y, 50, 50);

    // obstacle
    ctx.fillStyle="red";
    for(let i=0;i<obstacles.length;i++){
        let o=obstacles[i];
        o.y+=speed;

        ctx.fillRect(o.x,o.y,o.w,o.h);

        if(px-25 < o.x+o.w && px+25 > o.x &&
           player.y < o.y+o.h && player.y+50 > o.y){
            gameOver=true;
        }

        if(o.y>canvas.height){
            obstacles.splice(i,1);
            i--;
        }
    }

    // coin
    for(let i=0;i<coins.length;i++){
        let c=coins[i];
        c.y+=speed;

        c.frame+=0.2;
        if(c.frame>=TOTAL_FRAMES) c.frame=0;

        let f=Math.floor(c.frame);

        ctx.drawImage(
            coinSprite,
            f*FRAME_WIDTH,0,
            FRAME_WIDTH,FRAME_HEIGHT,
            c.x-15,c.y-15,
            30,30
        );

        if(px-25 < c.x+15 && px+25 > c.x-15 &&
           player.y < c.y+15 && player.y+50 > c.y){

            coinScore++;
            document.getElementById("coinSound").play();

            coins.splice(i,1);
            i--;
        }

        if(c.y>canvas.height){
            coins.splice(i,1);
            i--;
        }
    }

    // score
    score++;
    ctx.fillStyle="white";
    ctx.font="12px 'Press Start 2P'";
    ctx.fillText("Score: "+score,15,30);
    ctx.fillText("Coins: "+coinScore,15,55);

    // speed up
    if(score - lastSpeedUp >= 500){
        speed = Math.min(speed+2,20);
        lastSpeedUp = score;
    }

    requestAnimationFrame(draw);
}
</script>

</body>
</html>
