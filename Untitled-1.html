<!DOCTYPE html>
<html>
<head>
    <title>Subway Mini</title>
    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
        }
        canvas {
            display: block;
            margin: auto;
            background: #111;
        }
    </style>
</head>
<body>

<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let coins = [];
let coinScore = 0;
function spawnCoin() {
    let lane = Math.floor(Math.random() * 4);
    coins.push({
        x: lanes[lane],
        y: -20,
        size: 20
    });
}
setInterval(spawnCoin, 1500);
let player = {
    x: 180,
    y: 500,
    width: 50,
    height: 50,
    lane: 1
};

let lanes = [40, 140, 240, 340];
let obstacles = [];
let score = 0;
let speed = 4;
let gameOver = false;
let crashFrame = 0;

// điều khiển
document.addEventListener("keydown", (e) => {
    if(e.key === "ArrowLeft" && player.lane > 0) player.lane--;
   if(e.key === "ArrowRight" && player.lane < 3) player.lane++;
});

// tạo vật cản
function spawnObstacle() {
    let lane = Math.floor(Math.random() * 4);
    obstacles.push({
        x: lanes[lane],
        y: -20,
        width: 60,
        height: 60
    });
}

setInterval(spawnObstacle, 1000);

// vẽ game
function draw() {

    // animation khi chết
    if(gameOver) {
        crashFrame++;

        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, 400, 600);

        ctx.fillStyle = "orange";
        ctx.fillRect(player.x, player.y, player.width, player.height);

        ctx.fillStyle = "white";
        ctx.font = "30px Arial";
        ctx.fillText("CRASH 💥", 120, 300);

        if(crashFrame > 60) {
            alert("Game Over 😭\nScore: " + score);
            document.location.reload();
        }

        return; // dừng phần còn lại
    }

    // phần game bình thường bên dưới
    ctx.fillStyle = "#111";
    ctx.fillRect(0, 0, 400, 600);

    player.x = lanes[player.lane];
    ctx.fillStyle = "lime";
    ctx.fillRect(player.x, player.y, player.width, player.height);

    ctx.fillStyle = "red";
    for(let i = 0; i < obstacles.length; i++) {
        let o = obstacles[i];
        o.y += speed;
        ctx.fillRect(o.x, o.y, o.width, o.height);

        if(
            player.x < o.x + o.width &&
            player.x + player.width > o.x &&
            player.y < o.y + o.height &&
            player.y + player.height > o.y
        ) {
            gameOver = true;
        }
    }

    obstacles = obstacles.filter(o => o.y < 600);

    score++;
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 10, 30);
ctx.fillStyle = "yellow";

for (let i = 0; i < coins.length; i++) {
    let c = coins[i];

    // cho coin rơi xuống
    c.y += speed;

    // vẽ coin (hình tròn)
    ctx.beginPath();
    ctx.arc(c.x, c.y, 10, 0, Math.PI * 2);
    ctx.fill();

    // kiểm tra ăn coin
    if (
        player.x < c.x + 10 &&
        player.x + player.width > c.x - 10 &&
        player.y < c.y + 10 &&
        player.y + player.height > c.y - 10
    ) {
        coinScore++;
        coins.splice(i, 1);
        i--; // tránh lỗi bỏ qua phần tử
    }
}
    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
